; PlatformIO project configuration for the ESP32-32S PV surplus load controller.
; Default build: WiFi + MQTT (Home Assistant) ON; OLED off (config.h flags).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; WiFi/MQTT (Home Assistant). Only compiled/linked when ENABLE_WIFI=1 (default).
lib_deps =
    knolleary/PubSubClient@^2.8

; -Wall/-Wextra keep the production build honest. For a pure-local standalone
; build (no networking), add -DENABLE_WIFI=0 here.
build_flags =
    -Wall
    -Wextra
